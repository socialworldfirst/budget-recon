<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Content spend recon</title>
<style>
:root{--ink:#1a1a1a;--soft:#6b6b6b;--faint:#9a9a9a;--line:#ededed;--bar:#1a1a1a;--coe:#3a6ea5;--flag:#a83232;--ok:#2f7d54}
*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--ink);font:13.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.page{max-width:1040px;margin:0 auto;padding:42px 32px 90px}
.kick{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin:0 0 8px}
h1{font-size:22px;font-weight:600;letter-spacing:-.02em;margin:0 0 6px}
h2{font-size:15px;font-weight:600;margin:30px 0 4px}h3{font-size:12.5px;font-weight:600;color:var(--soft);margin:18px 0 6px}
.src{font-size:12px;color:var(--faint);margin:0 0 16px}
.tabs{display:flex;gap:6px;margin:8px 0 18px;border-bottom:1px solid var(--line)}
.tab{font:12.5px/1 inherit;font-weight:600;border:0;border-bottom:2px solid transparent;background:none;color:var(--faint);padding:9px 4px;margin-right:14px;cursor:pointer}
.tab.active{color:var(--ink);border-bottom-color:var(--ink)}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;text-align:right}th.l{text-align:left}
td.c{text-align:left}td.b,td.a,td.pp,td.mn{text-align:right;font-variant-numeric:tabular-nums}
td.a{font-weight:600}td.pp,td.mn{color:var(--soft)}.z{color:#d4d4d4}
tr.subt td{font-weight:700;border-top:2px solid #d8d8d8;background:#fafafa}
tr.subt.tog{cursor:pointer}tr.subt .rt{font-weight:400;color:var(--faint);font-size:11px;margin-left:4px}
tr.coe{cursor:pointer}tr.coe td.c{color:var(--coe);font-weight:600;padding-left:24px}tr.coe td{border-bottom:1px solid #f1f1f1}
tr.det td.c{color:var(--soft);padding-left:24px}tr.det.l2 td.c{padding-left:46px}tr.det td{border-bottom:1px solid #f5f5f5}
.al{color:var(--faint);font-size:10.5px;margin-left:5px;font-weight:400}
tr.grand td{font-weight:700;border-top:2px solid var(--ink);border-bottom:0;font-size:13.5px;padding-top:11px}
.cv{display:inline-block;width:12px;color:var(--faint);transition:transform .12s;font-size:10px}
tr.tog.open .cv{transform:rotate(90deg)}
.cmp{text-align:left;min-width:118px}
.cb{display:inline-block;width:56px;height:6px;background:#eee;border-radius:4px;overflow:hidden;vertical-align:middle;margin-right:7px}
.cb span{display:block;height:100%;background:var(--bar)}
.ghost{color:#b9b9b9;font-style:italic;font-size:11px;white-space:nowrap}
.mtabs{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 12px}
.mtab{font:11.5px/1 inherit;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--soft);border-radius:7px;padding:6px 11px;cursor:pointer}
.mtab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
table.rk{max-width:430px}table.rk tr.subt td{border-top:1px solid #d8d8d8}
.ck{font-weight:600}.ck.ok{color:var(--ok)}.ck.no{color:var(--flag)}
.flag{margin:12px 0 0;max-width:560px;font-size:12px;border:1px solid var(--line);border-left:3px solid var(--ok);border-radius:8px;padding:11px 14px;color:var(--soft)}
.flag.on{border-left-color:var(--flag)}.flag b{color:var(--ink)}
ul.flow{font-size:12.5px;color:#333;padding-left:18px}ul.flow li{margin:0 0 7px}
.foot{margin-top:24px;font-size:11.5px;color:var(--faint);border-top:1px solid var(--line);padding-top:13px}.foot b{color:var(--soft)}

body.locked{overflow:hidden}#gate{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:50}
#gate-card{border:1px solid #e7e7e7;border-radius:14px;padding:34px 32px;width:300px;text-align:center;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#gate-card h2{font-size:15px;font-weight:600;margin:0 0 4px}#gate-card p{font-size:12.5px;color:#9a9a9a;margin:0 0 18px}
#gate-input{width:100%;padding:10px 12px;border:1px solid #e7e7e7;border-radius:8px;font-size:14px;outline:none;text-align:center}
#gate-btn{width:100%;margin-top:10px;padding:10px;border:0;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{color:#a83232;font-size:12.5px;margin-top:10px;min-height:16px}#content[hidden]{display:none}</style></head>

async function dec(p){var b=JSON.parse(document.getElementById('payload').textContent);var k=await dk(p,b2b(b.salt),b.iterations);var x=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(b.iv)},k,b2b(b.ciphertext));return new TextDecoder().decode(x);}
function rv(h){document.getElementById('content').innerHTML=h;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');}
async function gs(e){e.preventDefault();var i=document.getElementById('gate-input'),er=document.getElementById('gate-err');er.textContent='';try{rv(await dec(i.value));try{localStorage.setItem(LS,i.value);}catch(_){}}catch(x){er.textContent='wrong password';i.value='';i.focus();}return false;}
(async function(){try{var c=localStorage.getItem(LS);if(c){rv(await dec(c));}}catch(_){try{localStorage.removeItem(LS);}catch(__){}}})();

function setG(g,show){document.querySelectorAll('tr[data-g]').forEach(function(r){var dg=r.getAttribute('data-g');
 if(dg===g){r.hidden=!show;}else if(dg.indexOf(g+'-')===0&&!show){r.hidden=true;}});
 if(!show){document.querySelectorAll('[data-tg^="'+g+'-"]').forEach(function(x){x.classList.remove('open');});}}
document.addEventListener('click',function(e){
 var h=e.target.closest('[data-tg]');
 if(h){var g=h.getAttribute('data-tg');setG(g,h.classList.toggle('open'));return;}
 var t=e.target.closest('[data-tab]');
 if(t){var id=t.getAttribute('data-tab');document.querySelectorAll('[data-tab]').forEach(function(x){x.classList.toggle('active',x===t);});
   document.querySelectorAll('.tabpane').forEach(function(p){p.hidden=(p.id!==id);});return;}
 var mt=e.target.closest('[data-mtab]');
 if(mt){var mid=mt.getAttribute('data-mtab');document.querySelectorAll('[data-mtab]').forEach(function(x){x.classList.toggle('active',x===mt);});
   document.querySelectorAll('.mpane').forEach(function(p){p.hidden=(p.id!==mid);});}
});
</script></body></html>
