<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>May Budget &amp; PO Reconciliation</title>
<style>

  :root{
    --ink:#1a1a1a; --soft:#6b6b6b; --faint:#9a9a9a; --line:#e7e7e7;
    --bg:#fff; --panel:#fafafa; --accent:#1a1a1a;
    --ok:#2f7d54; --warn:#b4690e; --stop:#a83232;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{display:grid;grid-template-columns:240px 1fr;max-width:1120px;margin:0 auto;gap:0}
  /* sidebar */
  nav{position:sticky;top:0;align-self:start;height:100vh;padding:38px 26px 38px 34px;border-right:1px solid var(--line)}
  nav .kick{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:0 0 18px}
  nav h1{font-size:17px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  nav .sub{font-size:12.5px;color:var(--soft);margin:0 0 26px}
  nav ol{list-style:none;margin:0;padding:0;counter-reset:s}
  nav ol li{counter-increment:s;margin:0 0 2px}
  nav ol li a{display:block;padding:7px 0;color:var(--soft);text-decoration:none;font-size:13.5px;border-bottom:1px solid transparent}
  nav ol li a::before{content:counter(s);display:inline-block;width:22px;color:var(--faint);font-variant-numeric:tabular-nums}
  nav ol li a:hover{color:var(--ink)}
  nav ol li a.active{color:var(--ink);font-weight:600}
  /* main */
  main{padding:52px 60px 120px}
  section{padding:0 0 46px;margin:0 0 46px;border-bottom:1px solid var(--line)}
  section:last-child{border-bottom:0}
  .num{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:0 0 10px}
  h2{font-size:23px;font-weight:600;letter-spacing:-.02em;margin:0 0 14px}
  h3{font-size:15px;font-weight:600;margin:22px 0 8px}
  p{margin:0 0 12px;color:#2c2c2c}
  .lead{font-size:16px;color:#333}
  strong{font-weight:600}
  .soft{color:var(--soft)}
  code{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace}
  ul{margin:0 0 12px;padding-left:18px}
  li{margin:0 0 7px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:8px;vertical-align:middle}
  .d-ok{background:var(--ok)} .d-warn{background:var(--warn)} .d-stop{background:var(--stop)} .d-ink{background:var(--ink)}
  /* the big picture box */
  .pic{border:1px solid var(--line);border-radius:12px;padding:26px 28px;background:var(--panel);margin:6px 0 8px}
  .eq{display:flex;align-items:stretch;gap:14px;flex-wrap:wrap;margin:4px 0 0}
  .eq .box{flex:1;min-width:150px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:14px 16px}
  .eq .box .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 6px}
  .eq .box .big{font-size:15px;font-weight:600;margin:0 0 3px}
  .eq .op{display:flex;align-items:center;font-size:22px;color:var(--faint);font-weight:300}
  /* step list */
  .steps{counter-reset:st;list-style:none;padding:0;margin:10px 0 0}
  .steps>li{counter-increment:st;position:relative;padding:0 0 16px 40px;margin:0}
  .steps>li::before{content:counter(st);position:absolute;left:0;top:-2px;width:26px;height:26px;border:1px solid var(--line);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;color:var(--ink);background:#fff}
  .steps>li:not(:last-child)::after{content:"";position:absolute;left:13px;top:26px;bottom:2px;width:1px;background:var(--line)}
  .see{display:block;font-size:13px;color:var(--soft);margin-top:3px}
  .see b{color:#444;font-weight:600}
  /* matrix table */
  table{border-collapse:collapse;width:100%;margin:10px 0 6px;font-size:13.5px}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line)}
  th{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:600}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:var(--panel)}
  .tag{font-size:11px;color:var(--soft);border:1px solid var(--line);border-radius:20px;padding:2px 9px;white-space:nowrap}
  .callout{border:1px solid var(--line);border-left:3px solid var(--ink);border-radius:8px;padding:14px 18px;margin:10px 0;background:#fff}
  .callout.stop{border-left-color:var(--stop)}
  .callout .h{font-weight:600;margin:0 0 4px}
  .mini{font-size:12.5px;color:var(--faint);margin-top:4px}
  .rule{display:grid;grid-template-columns:auto 1fr;gap:0 14px;margin:8px 0}
  .rule .if{font-weight:600;color:#333}
  .rule .then{color:#444}
  .rule .row{display:contents}
  .footer{color:var(--faint);font-size:12px;margin-top:30px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}nav{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}main{padding:30px 22px 80px}}

/* gate */
body.locked{overflow:hidden}
#gate{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:50}
#gate-card{border:1px solid #e7e7e7;border-radius:14px;padding:34px 32px;width:300px;text-align:center;
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
#gate-card h2{font-size:15px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px;color:#1a1a1a}
#gate-card p{font-size:12.5px;color:#9a9a9a;margin:0 0 18px}
#gate-input{width:100%;padding:10px 12px;border:1px solid #e7e7e7;border-radius:8px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#bdbdbd}
#gate-btn{width:100%;margin-top:10px;padding:10px;border:0;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{color:#a83232;font-size:12.5px;margin-top:10px;min-height:16px}
#content[hidden]{display:none}
</style>
</head>
<body class="locked">
<div id="gate"><div id="gate-card">
  <h2>May Budget &amp; PO Reconciliation</h2>
  <p>internal &middot; enter password</p>
  <form id="gate-form" onsubmit="return gateSubmit(event)">
    <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
var LSKEY="budget_recon_pw";
function b64ToBytes(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function deriveKey(pw,salt,it){var enc=new TextEncoder();
  var bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){var b=JSON.parse(document.getElementById('payload').textContent);
  var k=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);
  var p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},k,b64ToBytes(b.ciphertext));
  return new TextDecoder().decode(p);}
function reveal(html){var c=document.getElementById('content');c.innerHTML=html;c.hidden=false;
  document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initScrollspy();}
async function gateSubmit(e){e.preventDefault();var inp=document.getElementById('gate-input'),err=document.getElementById('gate-err');err.textContent='';
  try{var h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem(LSKEY,inp.value);}catch(_){}}
  catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
function initScrollspy(){var links=[].slice.call(document.querySelectorAll('nav a'));
  var map=new Map(links.map(function(a){return [a.getAttribute('href').slice(1),a];}));
  var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){
    links.forEach(function(l){l.classList.remove('active');});var a=map.get(e.target.id);if(a)a.classList.add('active');}});},
    {rootMargin:'-30% 0px -60% 0px'});
  document.querySelectorAll('section').forEach(function(s){obs.observe(s);});}
(async function(){try{var c=localStorage.getItem(LSKEY);if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem(LSKEY);}catch(__){}}})();
</script>
